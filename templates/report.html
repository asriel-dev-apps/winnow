<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Winnow Report</title>
  <script>document.documentElement.classList.add('js');</script>
  <style>
    /* ---- tokens ---- */
    :root {
      color-scheme: light dark;
      --page:#f9f9f7; --card:#fcfcfb; --ink:#17181a; --ink-2:#52514e; --muted:#898781;
      --line:#e1e0d9; --ring:rgba(11,11,11,.10);
      --gold:#c9920e; --gold-text:#7a5800; --gold-wash:rgba(201,146,14,.08);
      /* source colors (validated categorical palette, fixed order) */
      --s-hn:#2a78d6; --s-zenn:#1baf7a; --s-qiita:#eda100; --s-hatebu:#008300;
      --s-ghtrend:#4a3aa7; --s-reddit:#e34948; --s-lobsters:#e87ba4; --s-agents:#eb6834;
      --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
      --sans:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,-apple-system,"Segoe UI",sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page:#0d0d0d; --card:#1a1a19; --ink:#f2f2ef; --ink-2:#c3c2b7; --muted:#898781;
        --line:#2c2c2a; --ring:rgba(255,255,255,.10);
        --gold:#e3b341; --gold-text:#e3b341; --gold-wash:rgba(227,179,65,.09);
        --s-hn:#3987e5; --s-zenn:#199e70; --s-qiita:#c98500; --s-hatebu:#008300;
        --s-ghtrend:#9085e9; --s-reddit:#e66767; --s-lobsters:#d55181; --s-agents:#d95926;
      }
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:var(--sans); font-size:15.5px; line-height:1.9; background:var(--page); color:var(--ink); -webkit-font-smoothing:antialiased; }
    :focus-visible { outline:2px solid var(--gold); outline-offset:2px; border-radius:4px; }

    /* ---- top bar ---- */
    .topbar { position:sticky; top:0; z-index:10; background:color-mix(in srgb, var(--page) 88%, transparent); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .topbar-in { max-width:760px; margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:14px; }
    .wordmark { font-family:var(--mono); font-weight:800; font-size:15px; letter-spacing:.14em; }
    .wordmark .tilt { color:var(--gold); }
    .runmeta { font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--muted); }
    .contentTabs { display:none; align-items:center; gap:3px; margin-left:auto; padding:3px; border:1px solid var(--line); border-radius:10px; background:var(--card); box-shadow:0 1px 2px var(--ring); }
    .js .contentTabs.is-visible { display:flex; }
    .contentTab { appearance:none; min-height:44px; min-width:44px; padding:0 13px; border:0; border-radius:7px; background:transparent; color:var(--ink-2); font-family:var(--sans); font-size:13.5px; font-weight:800; cursor:pointer; }
    .contentTab:hover { color:var(--ink); }
    .contentTab[aria-selected="true"] { background:var(--ink); color:var(--page); }
    .ownerChip { display:none; margin-left:auto; border:1px solid var(--line); border-radius:999px; padding:2px 9px; font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--ink-2); background:var(--card); white-space:nowrap; }
    .owner-mode .ownerChip { display:inline-flex; }

    /* ---- layout ---- */
    main, .hero { max-width:760px; margin:0 auto; padding:0 20px; }
    .hero { padding-top:36px; padding-bottom:8px; }
    .eyebrow { font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
    .hero .eyebrow { color:var(--gold-text); }
    h1 { margin:6px 0 18px; font-size:clamp(22px,4vw,28px); line-height:1.45; letter-spacing:.01em; }

    /* ---- macro summary ---- */
    .macro { list-style:none; margin:0 0 26px; padding:0; }
    .macro li { position:relative; padding-left:26px; margin:10px 0; font-size:16.5px; font-weight:600; line-height:1.8; }
    .macro li::before { content:"-"; position:absolute; left:0; color:var(--gold); font-weight:800; }

    /* ---- grains (signature): 1粒=掲載item 1件 ---- */
    .grains { display:flex; flex-wrap:wrap; align-items:center; gap:6px 14px; margin:8px 0 10px; }
    .ggroup { display:flex; gap:4px; }
    .grain { width:9px; height:9px; border-radius:3px; }
    @media (prefers-reduced-motion: no-preference) {
      .js .grain { animation:pop .35s cubic-bezier(.2,.7,.3,1) backwards; }
      @keyframes pop { from { transform:scale(0); } }
    }
    .legend { display:flex; flex-wrap:wrap; gap:4px 16px; font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--ink-2); margin-bottom:8px; }
    .legend .dot, .src .dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px; vertical-align:1px; }

    /* ---- story cards ---- */
    .story { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px 24px 16px; margin:18px 0; box-shadow:0 1px 2px var(--ring); }
    .story.is-fav { border-left:3px solid var(--gold); padding-left:22px; }
    .story.is-muted { opacity:.55; }
    .story.is-muted > p,
    .story.is-muted > .why,
    .story.is-muted > details,
    .story.is-muted > .links { display:none; }
    .story .eyebrow { display:flex; flex-wrap:wrap; align-items:center; gap:6px 14px; margin-bottom:10px; }
    .src { white-space:nowrap; }
    .chip { border:1px solid var(--line); border-radius:6px; padding:1px 7px; white-space:nowrap; color:var(--ink-2); }
    .chip.gold { border-color:var(--gold); color:var(--gold-text); background:var(--gold-wash); }
    .metaeng { color:var(--muted); white-space:nowrap; }
    h3 { margin:0 0 8px; font-size:19px; line-height:1.6; letter-spacing:.01em; }
    .story > p { margin:8px 0; color:var(--ink); }
    .why { margin:12px 0; padding:2px 0 2px 14px; border-left:3px solid var(--gold); color:var(--ink-2); font-size:14px; line-height:1.8; }
    .why b { color:var(--gold-text); font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; display:block; }
    details { margin:10px 0 0; border:1px solid var(--line); border-radius:10px; padding:10px 14px; background:var(--page); }
    details[open] { padding-bottom:6px; }
    summary { cursor:pointer; font-weight:700; font-size:13.5px; color:var(--ink-2); list-style:none; display:flex; align-items:center; gap:8px; }
    summary::-webkit-details-marker { display:none; }
    summary::before { content:"▸"; color:var(--gold); transition:transform .15s; }
    @media (prefers-reduced-motion: reduce) { summary::before { transition:none; } }
    details[open] summary::before { transform:rotate(90deg); }
    details p { margin:8px 0 4px; font-size:14px; color:var(--ink-2); }
    .links { margin:14px 0 4px; padding:0; list-style:none; border-top:1px solid var(--line); }
    .links li { padding:7px 0 0; font-size:13.5px; line-height:1.7; }
    .links a { color:var(--ink); text-decoration:underline; text-decoration-color:var(--line); text-underline-offset:3px; }
    .links a:hover { text-decoration-color:var(--gold); }
    .links .from { font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; color:var(--muted); }
    .muted { color:var(--muted); }

    /* ---- watch sections ---- */
    .watchSection { margin:30px 0; padding-top:18px; border-top:1px solid var(--line); }
    .watchCards { margin-top:10px; display:grid; gap:12px; }
    .watchCard { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px 18px 12px; box-shadow:0 1px 2px var(--ring); }
    .watchRepo { margin:0 0 8px; font-family:var(--mono); font-size:13px; line-height:1.5; letter-spacing:.04em; }
    .watchList, .rankingList { margin:8px 0 0; padding-left:22px; }
    .watchList li, .rankingList li { padding:4px 0; border-bottom:1px dashed var(--line); }
    .watchList li:last-child, .rankingList li:last-child { border-bottom:0; }
    .watchList a, .rankingList a { color:var(--ink); text-decoration:underline; text-decoration-color:var(--line); text-underline-offset:3px; }
    .watchList a:hover, .rankingList a:hover { text-decoration-color:var(--gold); }
    .watchDate { margin-left:8px; font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--muted); }
    .watchList p { margin:2px 0 4px; color:var(--ink-2); font-size:14px; line-height:1.7; }
    .rankingList { font-family:var(--mono); font-size:13px; }
    .rankNote { font-family:var(--sans); color:var(--ink-2); }

    /* ---- owner actions ---- */
    .storyActions { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
    .actionBtn { appearance:none; display:inline-flex; align-items:center; justify-content:center; gap:7px; min-height:44px; min-width:44px; padding:0 13px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink-2); font-family:var(--sans); font-size:14px; font-weight:700; cursor:pointer; }
    .actionBtn svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .actionBtn:hover { border-color:var(--muted); color:var(--ink); }
    .actionBtn.is-active { color:var(--gold-text); border-color:var(--gold); background:var(--gold-wash); }
    .actionBtn.no.is-active { color:var(--ink-2); border-color:var(--muted); background:var(--page); }

    /* ---- fetch status ---- */
    .fetchwrap { margin:34px 0 60px; }
    .fetch { margin:8px 0 0; padding:0; list-style:none; font-family:var(--mono); font-size:11.5px; letter-spacing:.04em; color:var(--ink-2); }
    .fetch li { display:flex; gap:10px; padding:4px 0; border-bottom:1px dashed var(--line); }
    .fetch .ok { color:var(--s-hatebu); } .fetch .ng { color:var(--s-reddit); }
    .siteFooter { max-width:760px; margin:0 auto; padding:0 20px 34px; }
    .authLink { display:none; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.14em; color:var(--muted); text-decoration:underline; text-decoration-color:var(--line); text-underline-offset:3px; }
    .authLink:hover { color:var(--ink-2); text-decoration-color:var(--gold); }
    .authLink.is-visible { display:inline-flex; }
    .content-hidden { display:none; }

    @media (max-width:520px) {
      body { font-size:15px; }
      .story { padding:18px 16px 12px; border-radius:12px; }
      .story.is-fav { padding-left:14px; }
      .topbar-in { flex-wrap:wrap; }
      .runmeta { display:none; }
      .contentTabs { order:3; flex:1 0 100%; margin-left:0; }
      .contentTab { flex:1 1 0; padding:0 8px; }
      .ownerChip { margin-left:auto; font-size:10.5px; }
      .actionBtn { flex:1 1 160px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-in">
      <span class="wordmark">WINNO<span class="tilt">W̸</span></span>
      <span class="runmeta" id="runmeta"></span>
      <!--__CONTENT_TABS__-->
      <span class="ownerChip" id="ownerChip">★ 0 / ✕ 0</span>
    </div>
  </div>
  <header class="hero">
    <!--__STATIC_HEADER__-->
  </header>
  <main>
    <section id="docMode"><!--__STATIC_DOCUMENT__--></section>
  </main>
  <footer class="siteFooter">
    <a class="authLink" id="authLink" href="/login">LOGIN</a>
  </footer>
  <script>
    const data = /*__WINNOW_DATA__*/;
    const state = { feedback:{} };
    const queueKey = 'winnow-feedback-queue';
    const apiBase = location.protocol === 'file:' ? (data.apiBase || '') : '';

    document.getElementById('runmeta').textContent = `${data.date || ''} · RUN ${data.run_id ?? ''} · ${(data.stories || []).length} STORIES`;

    function initContentTabs() {
      const tabs = document.getElementById('contentTabs');
      const buttons = tabs ? [...tabs.querySelectorAll('[data-tab]')] : [];
      const hero = document.querySelector('.hero');
      const stories = [...document.querySelectorAll('article.story')];
      const fetchwrap = document.querySelector('.fetchwrap');
      const views = {
        survey: [hero, ...stories, fetchwrap].filter(Boolean),
        releases: [document.getElementById('releaseView')].filter(Boolean),
        ranking: [document.getElementById('rankingView')].filter(Boolean),
      };
      const available = new Set(['survey']);
      if (views.releases.length) available.add('releases');
      if (views.ranking.length) available.add('ranking');
      for (const button of buttons) {
        if (!available.has(button.dataset.tab)) button.hidden = true;
      }
      if (tabs && available.size > 1) tabs.classList.add('is-visible');

      function routeFromHash() {
        if (location.hash === '#releases') return available.has('releases') ? 'releases' : 'survey';
        if (location.hash === '#ranking') return available.has('ranking') ? 'ranking' : 'survey';
        return 'survey';
      }
      function setVisible(view, shouldScroll) {
        for (const [name, elements] of Object.entries(views)) {
          const hidden = name !== view;
          for (const element of elements) element.classList.toggle('content-hidden', hidden);
        }
        for (const button of buttons) {
          button.setAttribute('aria-selected', String(button.dataset.tab === view));
        }
        if (shouldScroll) window.scrollTo({ top: 0 });
      }
      function selectTab(view, shouldScroll = true) {
        const next = available.has(view) ? view : 'survey';
        if (next === 'survey') {
          if (location.hash) history.pushState('', document.title, location.pathname + location.search);
          setVisible('survey', shouldScroll);
          return;
        }
        const hash = next === 'releases' ? '#releases' : '#ranking';
        if (location.hash === hash) setVisible(next, shouldScroll);
        else location.hash = hash;
      }

      for (const button of buttons) {
        button.addEventListener('click', () => selectTab(button.dataset.tab));
      }
      window.addEventListener('hashchange', () => setVisible(routeFromHash(), true));
      setVisible(routeFromHash(), false);
    }

    initContentTabs();

    function setAuthLink(mode) {
      const link = document.getElementById('authLink');
      if (!link || location.protocol === 'file:') return;
      if (mode === 'owner') {
        link.href = '/logout';
        link.textContent = 'LOGOUT';
        link.classList.add('is-visible');
      } else if (mode === 'viewer') {
        link.href = '/login';
        link.textContent = 'LOGIN';
        link.classList.add('is-visible');
      } else {
        link.classList.remove('is-visible');
      }
    }
    function saveQueue(payload) {
      const q = JSON.parse(localStorage.getItem(queueKey) || '[]');
      q.push(payload);
      localStorage.setItem(queueKey, JSON.stringify(q));
    }
    async function postFeedback(payload) {
      try {
        const res = await fetch(`${apiBase}/api/feedback`, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(payload)});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch {
        saveQueue(payload);
      }
    }
    async function flushQueue() {
      const q = JSON.parse(localStorage.getItem(queueKey) || '[]');
      if (!q.length) return;
      localStorage.setItem(queueKey, '[]');
      for (const payload of q) await postFeedback(payload);
    }
    function storyItems(story) {
      return (story.items || []).map((item) => String(item.id || '')).filter(Boolean);
    }
    function storyState(story) {
      for (const itemId of storyItems(story)) {
        const verdict = state.feedback[itemId];
        if (verdict) return verdict;
      }
      return '';
    }
    function payload(story, verdict) {
      return { run_id:data.run_id, cluster_id:story.cluster_id, item_ids:storyItems(story), verdict };
    }
    function icon(type) {
      if (type === 'star') return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9L12 3z"/></svg>';
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>';
    }
    function applyStoryState(article, story) {
      const verdict = storyState(story);
      article.classList.toggle('is-fav', verdict === 'favorite');
      article.classList.toggle('is-muted', verdict === 'not_interested');
      const fav = article.querySelector('[data-feedback-action="favorite"]');
      const no = article.querySelector('[data-feedback-action="not_interested"]');
      if (fav) {
        fav.classList.toggle('is-active', verdict === 'favorite');
        fav.setAttribute('aria-pressed', String(verdict === 'favorite'));
        fav.innerHTML = verdict === 'favorite' ? `${icon('star')} お気に入り ✓` : `${icon('star')} お気に入り`;
      }
      if (no) {
        no.classList.toggle('is-active', verdict === 'not_interested');
        no.setAttribute('aria-pressed', String(verdict === 'not_interested'));
        no.innerHTML = verdict === 'not_interested' ? `${icon('x')} 興味なし ✓（タップで戻す）` : `${icon('x')} 興味なし`;
      }
    }
    function updateOwnerChip() {
      const counts = { favorite:0, not_interested:0 };
      for (const story of data.stories || []) {
        const verdict = storyState(story);
        if (verdict === 'favorite' || verdict === 'not_interested') counts[verdict] += 1;
      }
      document.getElementById('ownerChip').textContent = `★ ${counts.favorite} / ✕ ${counts.not_interested}`;
    }
    function setStoryVerdict(article, story, nextVerdict) {
      const current = storyState(story);
      const verdict = current === nextVerdict ? 'undo' : nextVerdict;
      for (const itemId of storyItems(story)) {
        if (verdict === 'undo') delete state.feedback[itemId];
        else state.feedback[itemId] = verdict;
      }
      applyStoryState(article, story);
      updateOwnerChip();
      postFeedback(payload(story, verdict));
    }
    function enableOwnerMode(initialState) {
      state.feedback = {...initialState};
      document.body.classList.add('owner-mode');
      setAuthLink('owner');
      const articles = [...document.querySelectorAll('article.story')];
      for (const [index, article] of articles.entries()) {
        const story = (data.stories || [])[index];
        if (!story) continue;
        const bar = document.createElement('div');
        bar.className = 'storyActions';
        bar.innerHTML = `<button class="actionBtn fav" type="button" data-feedback-action="favorite" aria-pressed="false"></button><button class="actionBtn no" type="button" data-feedback-action="not_interested" aria-pressed="false"></button>`;
        bar.querySelector('[data-feedback-action="favorite"]').addEventListener('click', () => setStoryVerdict(article, story, 'favorite'));
        bar.querySelector('[data-feedback-action="not_interested"]').addEventListener('click', () => setStoryVerdict(article, story, 'not_interested'));
        article.append(bar);
        applyStoryState(article, story);
      }
      updateOwnerChip();
      flushQueue();
    }
    async function bootFeedbackUi() {
      const url = `${apiBase}/api/feedback/state?run_id=${encodeURIComponent(data.run_id ?? '')}`;
      if (location.protocol === 'file:') {
        try {
          const res = await fetch(url);
          const body = res.ok ? await res.json() : { state:{} };
          enableOwnerMode(body.state || {});
        } catch {
          enableOwnerMode({});
        }
        return;
      }
      try {
        const res = await fetch(url);
        if (!res.ok) {
          if (res.status === 401) setAuthLink('viewer');
          return;
        }
        const body = await res.json();
        enableOwnerMode(body.state || {});
      } catch {
        /* viewer mode: leave the static document untouched */
      }
    }
    window.addEventListener('online', flushQueue);
    bootFeedbackUi();
  </script>
</body>
</html>
